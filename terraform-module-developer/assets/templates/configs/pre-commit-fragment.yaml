# Pre-commit fragment for Terraform module repos.
# Append these blocks under `repos:` in your `.pre-commit-config.yaml`.
# If you don't have a pre-commit config yet, see the `pre-commit-setup` skill.

repos:
  # Terraform: fmt, validate, tflint, terraform-docs
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - "--args=--config=__GIT_WORKING_DIR__/.tflint.hcl"
      - id: terraform_docs
        args:
          - "--args=--config=.terraform-docs.yml"

  # Security scan: tfsec (or replace with trivy / checkov; pick ONE for pre-commit)
  - repo: https://github.com/aquasecurity/tfsec
    rev: v1.28.11
    hooks:
      - id: tfsec
        args: ["--minimum-severity=HIGH"]

  # Universal hygiene (also useful in any repo, not just Terraform)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
