apiVersion: v1
kind: Pod
spec:
  serviceAccountName: jenkins
  containers:
    - name: jnlp
      image: jenkins/inbound-agent:latest
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 500m, memory: 512Mi }

    # Rootless BuildKit — replaces docker:dind. Listens on TCP 1234 for
    # the buildctl client running in the tools container.
    - name: buildkit
      image: moby/buildkit:rootless
      args:
        - --addr
        - unix:///run/user/1000/buildkit/buildkitd.sock
        - --addr
        - tcp://0.0.0.0:1234
        - --oci-worker-no-process-sandbox
      securityContext:
        seccompProfile: { type: Unconfined }
        runAsUser: 1000
        runAsGroup: 1000
      readinessProbe:
        exec: { command: [buildctl, debug, workers] }
        initialDelaySeconds: 10
        periodSeconds: 15
      resources:
        requests: { cpu: 500m, memory: 1Gi }
        limits:   { cpu: 2,    memory: 4Gi }

    # Tools: kubectl, helm, git, jq, yq, ssh, curl, plus buildctl, skopeo,
    # syft, grype, cosign, sonar-scanner layered at runtime by setupTools().
    - name: tools
      image: alpine/k8s:latest
      command: [sleep]
      args: [infinity]
      env:
        - { name: BUILDKIT_HOST, value: tcp://127.0.0.1:1234 }
        - { name: DOCKER_CONFIG, value: /tmp/docker-config }
      volumeMounts:
        - { name: ssh-key,       mountPath: /root/.ssh-mount, readOnly: true }
        - { name: docker-config, mountPath: /tmp/docker-config, readOnly: true }
        - { name: vault-token,   mountPath: /var/run/secrets/vault, readOnly: true }
        - { name: slack-webhook, mountPath: /tmp/slack, readOnly: true }
      resources:
        requests: { cpu: 200m, memory: 256Mi }
        limits:   { cpu: 1,    memory: 1Gi }

  volumes:
    - name: docker-config
      secret:
        secretName: ${REGISTRY_CREDS_SECRET}
    - name: ssh-key
      secret:
        secretName: ${SSH_KEY_SECRET}
        defaultMode: 0400
    - name: slack-webhook
      secret:
        secretName: slack-webhook
        optional: true
    - name: vault-token
      projected:
        sources:
          - serviceAccountToken: { path: token, audience: vault, expirationSeconds: 600 }
