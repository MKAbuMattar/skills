# ============================================================================
# values.yaml — defaults for all environments.
# Override per env in values-<env>.yaml. See references/multi-environment.md.
# ============================================================================

# ---- Workload kind ----------------------------------------------------------
# Mutually exclusive — set one to true.
deployment:
  enabled: true
statefulset:
  enabled: false

replicaCount: 1
revisionHistoryLimit: 5

# ---- Update strategy --------------------------------------------------------
# RollingUpdate: incremental replace (default for stateless).
# Recreate:      terminate all then start all (single-instance stateful).
# For Argo Rollouts canary / blue-green, set rollout.enabled=true (below).
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
    # partition: 0     # StatefulSet only

# ---- Argo Rollouts (canary / blue-green) ------------------------------------
# Off by default. Flip on for traffic-shaped progressive delivery.
rollout:
  enabled: false
  strategy: rolling      # rolling | bluegreen | canary
  # canary:
  #   steps:
  #     - setWeight: 5
  #     - pause: { duration: 5m }
  #     - setWeight: 25
  #     - pause: { duration: 10m }
  #     - setWeight: 100
  # bluegreen:
  #   autoPromotionEnabled: false
  #   scaleDownDelaySeconds: 600

# ---- Image ------------------------------------------------------------------
image:
  repository: nginx
  tag: ""               # falls back to .Chart.AppVersion
  digest: ""            # if set, template emits repo@digest (preferred for prod)
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: registry-credentials

# ---- Naming -----------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# ---- Service account --------------------------------------------------------
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# ---- Pod metadata + security ------------------------------------------------
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
  # fsGroup: 2000
securityContext: {}
  # runAsNonRoot: true
  # runAsUser: 1000
  # readOnlyRootFilesystem: true
  # capabilities: { drop: [ALL] }

# ---- Service ----------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  extraPorts: []
  # - name: https
  #   port: 443
  #   targetPort: 443
  #   protocol: TCP
  annotations: {}

# ---- Ingress (classic) ------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: chart-example-tls
  #   hosts: [chart-example.local]

# ---- HTTPRoute (Gateway API) ------------------------------------------------
httpRoute:
  enabled: false
  parentRefs: []
  # - name: my-gateway
  #   namespace: gateway-system
  hostnames: []
  rules: []

# ---- HorizontalPodAutoscaler ------------------------------------------------
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ---- Resources --------------------------------------------------------------
resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 256Mi
  # limits:
  #   cpu: 500m
  #   memory: 512Mi

# ---- Probes (runtime-agnostic — fill paths/ports per app) -------------------
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
startupProbe:
  enabled: false
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 10

# ---- Init containers --------------------------------------------------------
initContainers: []
# - name: wait-for-db
#   image: busybox:1.36
#   command: ['sh', '-c', 'until nc -z db 5432; do sleep 1; done']

# ---- Environment variables --------------------------------------------------
env: []
# - name: NODE_ENV
#   value: production

# Reference values from a Secret (e.g. SealedSecret / ESO output).
envFromSecretRef: []
# - name: db-pass
#   keys: [password, host]

envFromConfigMapRef: []
# - name: app-config
#   keys: [LOG_LEVEL, FEATURE_FLAGS]

# ---- ConfigMap (created by this chart) --------------------------------------
configMap:
  enabled: false
  data: {}
  # NODE_ENV: production
  # LOG_LEVEL: info

# ---- Volumes ----------------------------------------------------------------
volumes: []
volumeMounts: []
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessModes: [ReadWriteOnce]

# ---- Node placement ---------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# Convenience: single nodePool.role drives both nodeSelector + a matching toleration.
nodePool:
  enabled: false
  role: ""             # e.g. "apps"; pod targets node-role=<role> AND tolerates that taint

# ---- Host aliases -----------------------------------------------------------
hostAliases: []
# - ip: 10.0.0.1
#   hostnames: [internal-api.local]

# ---- Disruption budget ------------------------------------------------------
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
